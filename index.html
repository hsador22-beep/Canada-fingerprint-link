<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada Secure Biometrics</title>
    <style>
        :root {
            --canada-red: #D00000;
            --canada-white: #FFFFFF;
            --canada-dark: #1E2A38;
            --success: #00ff88;
            --error: #ff4b2b;
            --bg: #0F1A28;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at center, #253B54 0%, var(--bg) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* === CANADA HEADER STYLE === */
        .canada-header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .canada-logo-text {
            color: var(--canada-white);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
        }
        .canada-subtext {
            color: var(--canada-white);
            opacity: 0.8;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .maple-leaf {
            color: var(--canada-red);
            font-size: 28px;
            font-weight: bold;
        }
        /* =========================== */


        h2 { font-weight: 300; letter-spacing: 1px; margin-bottom: 30px; font-size: 22px; }
        
        input {
            width: 85%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.3s;
        }

        .btn-reg { 
            background: linear-gradient(135deg, var(--canada-red), #FF4E4E); 
        }
        .btn-save { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .btn-login { 
            background: linear-gradient(135deg, #42a5f5, #00c6ff); 
            color: #000; 
            margin-top: 15px;
        }

        .btn:hover { transform: translateY(-2px); opacity: 0.95; }

        /* 3 Finger Grid */
        .finger-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px auto;
            width: 70%;
        }

        .slot {
            height: 45px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: 0.4s;
        }

        .slot.active {
            background: linear-gradient(135deg, #42a5f5, #00c6ff);
            box-shadow: 0 0 15px #42a5f5;
            color: #000;
            border: none;
        }

        .status-text { font-size: 13px; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SCREEN 1: FRONT PAGE WITH CANADA MATERIAL -->
    <div id="sec_welcome" class="sec">
        <div class="canada-header">
            <div class="maple-leaf">🍁</div>
            <h1 class="canada-logo-text">CANADA.COM</h1>
            <div class="canada-subtext">OFFICIAL SECURE ACCESS</div>
        </div>

        <h2>Sign In / Register</h2>
        <input type="text" id="new_name" placeholder="Enter Your Identity">
        <button class="btn btn-reg" onclick="signUp()">➕ START SECURE ACCESS</button>
    </div>

    <!-- SCREEN 2: DASHBOARD (3 FINGERS) -->
    <div id="sec_logged_in" class="sec" style="display:none;">
        <div class="canada-header" style="margin-bottom:15px; padding-bottom:10px;">
            <div class="maple-leaf" style="font-size:20px;">🍁</div>
            <div class="canada-logo-text" style="font-size:16px;">CANADA.COM</div>
        </div>

        <div style="font-size: 10px; color: #42a5f5; letter-spacing: 3px;">BIOMETRIC VERIFICATION</div>
        <h2 id="current_user_display">Secure User</h2>
        
        <div class="finger-grid" id="fingerGrid">
            <div class="slot" id="s1">1</div>
            <div class="slot" id="s2">2</div>
            <div class="slot" id="s3">3</div>
        </div>

        <button class="btn btn-save" id="btnSave" onclick="saveFinger()">✋ SAVE UNIQUE FINGER</button>
        <button class="btn btn-login" onclick="login()">👉 UNLOCK CANADA PORTAL</button>
        
        <div class="status-text" id="statusMsg">Scan 3 different fingers to activate.</div>
    </div>
</div>

<script>
const MY_LINK = "https://canada.com";

async function signUp() {
    let name = document.getElementById("new_name").value.trim();
    if (!name) return;
    
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    if (!all[name]) {
        all[name] = { fps: [] };
        localStorage.setItem("all_users", JSON.stringify(all));
    }
    
    localStorage.setItem("current_user", name);
    document.getElementById("current_user_display").textContent = name;
    showSection("logged_in");
    updateUI();
}

function showSection(name) {
    document.querySelectorAll(".sec").forEach(s => s.style.display = "none");
    document.getElementById("sec_"+name).style.display = "block";
}

async function saveFinger() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    
    // LIMIT = 3 FINGERS
    if (all[user].fps.length >= 3) {
        document.getElementById("statusMsg").innerText = "✅ All 3 fingers registered!";
        document.getElementById("statusMsg").style.color = "var(--success)";
        return;
    }

    try {
        const cred = await navigator.credentials.create({
            publicKey: {
                challenge: new Uint8Array(16),
                rp: { name: "Canada Secure", id: location.hostname },
                user: { id: new Uint8Array(16), name: user, displayName: user },
                pubKeyCredParams: [{type:"public-key", alg:-7}],
                authenticatorSelection: { userVerification:"required" }
            }
        });

        let idStr = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
        
        // PREVENT DUPLICATE
        if (all[user].fps.includes(idStr)) {
            let msg = document.getElementById("statusMsg");
            msg.innerText = "❌ SAME FINGER USED! USE ANOTHER.";
            msg.style.color = "var(--error)";
            return;
        }

        all[user].fps.push(idStr);
        localStorage.setItem("all_users", JSON.stringify(all));
        updateUI();
        document.getElementById("statusMsg").innerText = "✅ Finger " + all[user].fps.length + " Saved";
        document.getElementById("statusMsg").style.color = "var(--success)";
        
    } catch(e) { console.error(e); }
}

async function login() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    
    // REQUIRE 3 UNIQUE FINGERS
    if (all[user].fps.length < 3) { 
        alert("⚠️ You must save 3 unique fingers first!"); 
        return; 
    }

    try {
        let allowed = all[user].fps.map(id => ({
            type: "public-key",
            id: Uint8Array.from(atob(id), c=>c.charCodeAt(0))
        }));

        await navigator.credentials.get({
            publicKey: { challenge: new Uint8Array(16), allowCredentials: allowed }
        });

        alert("✅ VERIFIED! WELCOME TO CANADA.COM");
        window.location.href = MY_LINK;
    } catch(e) { alert("❌ VERIFICATION FAILED. FINGERPRINT NOT RECOGNIZED."); }
}

function updateUI() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    let count = all[user]?.fps.length || 0;
    
    // UPDATE ONLY 3 SLOTS
    for (let i = 1; i <= 3; i++) {
        let slot = document.getElementById("s" + i);
        if (i <= count) {
            slot.classList.add("active");
            slot.textContent = "✔";
        }
    }
}
</script>
</body>
</html>
