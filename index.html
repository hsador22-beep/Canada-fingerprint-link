<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Biometric Vault</title>
    <style>
        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --error: #ff4b2b;
            --glass: rgba(255, 255, 255, 0.05);
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg) 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.5s ease;
        }

        .logo {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Unique Finger Slots */
        .finger-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .slot {
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .slot.active {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            color: #000;
            border-color: var(--primary);
            transform: scale(1.05);
        }

        /* Scanning Animation */
        .scan-line {
            position: absolute;
            height: 2px;
            width: 100%;
            background: var(--primary);
            top: 0;
            left: 0;
            display: none;
            box-shadow: 0 0 10px var(--primary);
            animation: moveScan 1.5s infinite;
        }

        @keyframes moveScan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 75, 43, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 75, 43, 0.4);
        }

        .btn:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            min-height: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <div class="logo">Secure Access</div>
    <h2 id="header">Register Fingers</h2>

    <div class="finger-grid" id="fingerGrid">
        <div class="slot" id="slot1">1</div>
        <div class="slot" id="slot2">2</div>
        <div class="slot" id="slot3">3</div>
        <div class="slot" id="slot4">4</div>
        <div class="slot" id="slot5">5</div>
    </div>

    <button class="btn" id="actionBtn" onclick="handleRegistration()">SCAN NEW FINGER</button>
    
    <div class="status-msg" id="statusMsg">Place a unique finger to start.</div>
</div>

<script>
    // Logic to store and verify 5 UNIQUE fingerprints
    let registeredFingers = []; // This stores the unique Credential IDs

    async function handleRegistration() {
        const statusMsg = document.getElementById('statusMsg');
        const actionBtn = document.getElementById('actionBtn');

        if (registeredFingers.length >= 5) {
            // Already full - Logic to Login
            window.location.href = "https://www.canada.ca";
            return;
        }

        statusMsg.innerText = "Initializing sensor...";
        
        try {
            // Check if WebAuthn is supported
            if (!window.PublicKeyCredential) {
                alert("Biometrics not supported on this browser.");
                return;
            }

            // SIMULATED BIOMETRIC REQUEST (In a real app, use navigator.credentials.create)
            // We use a prompt here for the demo, but the logic remains the same for IDs
            const mockID = prompt("Enter a unique Finger ID (Simulating Bio-Scan):");
            
            if (!mockID) return;

            // SMART CHECK: Check if this "finger" is already in our list
            if (registeredFingers.includes(mockID)) {
                statusMsg.style.color = "var(--error)";
                statusMsg.innerText = "❌ DUPLICATE: Please use a DIFFERENT finger!";
                shakeCard();
            } else {
                // SUCCESS: Add unique finger
                registeredFingers.push(mockID);
                updateUI();
                statusMsg.style.color = "var(--success)";
                statusMsg.innerText = "✅ Unique finger recognized and saved.";
            }

        } catch (err) {
            statusMsg.innerText = "Scan failed. Try again.";
        }
    }

    function updateUI() {
        const count = registeredFingers.length;
        
        // Light up the corresponding slot
        document.getElementById(`slot${count}`).classList.add('active');
        document.getElementById(`slot${count}`).innerHTML = "✔";

        if (count === 5) {
            document.getElementById('header').innerText = "Access Granted";
            const btn = document.getElementById('actionBtn');
            btn.innerText = "ENTER SECURE VAULT";
            btn.style.background = "linear-gradient(135deg, #00f2ff, #00ff88)";
            document.getElementById('statusMsg').innerText = "All 5 unique fingers verified.";
        }
    }

    function shakeCard() {
        const card = document.getElementById('mainCard');
        card.style.transform = "translateX(10px)";
        setTimeout(() => card.style.transform = "translateX(-10px)", 100);
        setTimeout(() => card.style.transform = "translateX(10px)", 200);
        setTimeout(() => card.style.transform = "translateX(0)", 300);
    }
</script>

</body>
</html>
