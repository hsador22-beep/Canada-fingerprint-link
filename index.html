<style>
:root {
    --primary-glow: #00f2ff;
    --success-glow: #00ff88;
    --bg-dark: #0a0a0c;
    --glass: rgba(255, 255, 255, 0.05);
}

body {
    background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg-dark) 100%);
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.smart-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px;
    width: 400px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.finger-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin: 30px 0;
}

.finger-dot {
    height: 40px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.finger-dot.active {
    background: var(--primary-glow);
    box-shadow: 0 0 15px var(--primary-glow);
    color: #000;
    border: none;
}

.btn-smart {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    padding: 15px 30px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s;
}

.btn-smart:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3);
}
</style>

<div class="smart-card">
    <div style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.6;">BIOMETRIC AUTH v2.0</div>
    <h2 id="status-title">Initialize Scan</h2>
    
    <!-- Smart Finger Indicators -->
    <div class="finger-grid" id="fingerGrid">
        <div class="finger-dot">1</div>
        <div class="finger-dot">2</div>
        <div class="finger-dot">3</div>
        <div class="finger-dot">4</div>
        <div class="finger-dot">5</div>
    </div>

    <p id="instruction-text" style="font-size: 0.9rem; margin-bottom: 20px;">Place unique finger on sensor to begin.</p>
    
    <button class="btn-smart" onclick="startSmartScan()">REGISTER FINGER</button>
</div>
