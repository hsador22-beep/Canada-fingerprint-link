<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada.com - Official Secure Access</title>
    <style>
        :root {
            --canada-red: #D00000;
            --canada-blue: #003B95;
            --canada-white: #FFFFFF;
            --canada-dark: #0F1A28;
            --success: #00E676;
            --error: #FF1744;
            --glass: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, var(--canada-blue) 0%, var(--canada-dark) 100%);
            color: var(--canada-white);
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 35px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* === CANADA OFFICIAL HEADER === */
        .canada-header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .maple-leaf {
            color: var(--canada-red);
            font-size: 32px;
            margin-bottom: 5px;
        }
        .canada-logo-text {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--canada-red), var(--canada-white), var(--canada-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .canada-subtext {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.85;
        }
        /* ============================== */

        h2 { 
            font-weight: 400; 
            font-size: 20px; 
            margin-bottom: 20px; 
            color: #E0E0E0;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }
        label {
            font-size: 12px;
            opacity: 0.7;
            margin-left: 8px;
            margin-bottom: 4px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--input-bg);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--canada-white);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }

        .btn {
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-reg { 
            background: linear-gradient(135deg, var(--canada-red), #FF5252); 
        }
        .btn-reg:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(208, 0, 0, 0.3);
        }

        .btn-save { 
            background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 255, 255, 0.25); 
        }
        .btn-save:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-login { 
            background: linear-gradient(135deg, var(--canada-blue), #2196F3); 
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 59, 149, 0.3);
        }

        /* 3 Finger Grid Design */
        .finger-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin: 25px auto;
            width: 80%;
        }
        .slot {
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .slot.active {
            background: linear-gradient(135deg, var(--success), #69F0AE);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
            color: #000;
            border: none;
            font-weight: bold;
        }

        .status-text { 
            font-size: 13px; 
            color: #BDBDBD; 
            margin-top: 10px; 
            min-height: 20px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: left;
            line-height: 1.5;
        }

        /* NEW: Login Button Style */
        .btn-main-login {
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            margin-top: 15px;
            font-size: 16px;
            padding: 16px;
        }
        .btn-main-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }
        .divider span {
            padding: 0 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- SCREEN 1: OFFICIAL REGISTRATION FORM + LOGIN OPTION -->
    <div id="sec_welcome" class="sec">
        <div class="canada-header">
            <div class="maple-leaf">🍁</div>
            <h1 class="canada-logo-text">CANADA.COM</h1>
            <div class="canada-subtext">OFFICIAL SECURE PORTAL</div>
        </div>

        <h2>Identity Verification</h2>

        <div class="form-group">
            <label>Full Legal Name</label>
            <input type="text" id="full_name" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>Father's Name</label>
            <input type="text" id="father_name" placeholder="Enter father's name">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age" placeholder="Your age" min="1" max="120">
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="birthday">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Residential Address</label>
            <input type="text" id="address" placeholder="City, Province, Postal Code">
        </div>

        <div class="form-group">
            <label>Government ID Number</label>
            <input type="text" id="id_number" placeholder="ID / Passport Number">
        </div>

        <button class="btn btn-reg" onclick="submitRegistration()">✅ REGISTER NEW ACCOUNT</button>

        <!-- ✅ NEW: LOGIN BUTTON ADDED HERE -->
        <div class="divider"><span>OR</span></div>
        <button class="btn btn-main-login" onclick="openLogin()">🔐 LOGIN TO YOUR ACCOUNT</button>
    </div>

    <!-- SCREEN 2: BIOMETRIC VERIFICATION -->
    <div id="sec_logged_in" class="sec" style="display:none;">
        <div class="canada-header" style="padding-bottom:10px; margin-bottom:15px;">
            <div class="maple-leaf" style="font-size:22px;">🍁</div>
            <div class="canada-logo-text" style="font-size:18px;">CANADA.COM</div>
            <div class="canada-subtext" style="font-size:10px;">BIOMETRIC SECURITY</div>
        </div>

        <div class="info-card">
            <strong>Verified User:</strong> <span id="disp_name"></span><br>
            <strong>ID:</strong> <span id="disp_id"></span>
        </div>

        <h2>Register 3 Unique Fingers</h2>
        
        <div class="finger-grid" id="fingerGrid">
            <div class="slot" id="s1">1</div>
            <div class="slot" id="s2">2</div>
            <div class="slot" id="s3">3</div>
        </div>

        <button class="btn btn-save" id="btnSave" onclick="saveFinger()">✋ SCAN NEW FINGERPRINT</button>
        <button class="btn btn-login" onclick="login()">🚀 ACCESS CANADA.COM</button>
        
        <div class="status-text" id="statusMsg">* Do not use the same finger twice</div>
    </div>

    <!-- ✅ NEW: LOGIN SCREEN -->
    <div id="sec_login" class="sec" style="display:none;">
        <div class="canada-header">
            <div class="maple-leaf">🍁</div>
            <h1 class="canada-logo-text">CANADA.COM</h1>
            <div class="canada-subtext">SECURE LOGIN</div>
        </div>

        <h2>Existing User Login</h2>

        <div class="form-group">
            <label>Full Legal Name</label>
            <input type="text" id="login_name" placeholder="Enter your registered name">
        </div>

        <div class="form-group">
            <label>Government ID Number</label>
            <input type="text" id="login_id" placeholder="Enter your ID / Passport Number">
        </div>

        <button class="btn btn-login" onclick="verifyLogin()">🔐 LOGIN</button>
        <button class="btn btn-save" onclick="backToHome()">⬅ BACK</button>
    </div>
</div>

<script>
const MY_LINK = "https://canada.com";
let userData = {};

// Step 1: Collect ALL information for new registration
function submitRegistration() {
    userData = {
        full_name: document.getElementById("full_name").value.trim(),
        father_name: document.getElementById("father_name").value.trim(),
        age: document.getElementById("age").value,
        birthday: document.getElementById("birthday").value,
        gender: document.getElementById("gender").value,
        address: document.getElementById("address").value.trim(),
        id_number: document.getElementById("id_number").value.trim(),
        fingerprints: []
    };

    if(!userData.full_name || !userData.father_name || !userData.age || !userData.birthday || !userData.id_number) {
        alert("❌ Please fill in ALL required fields correctly.");
        return;
    }

    // Save data privately
    localStorage.setItem("canada_user_data", JSON.stringify(userData));

    // Show summary on next screen
    document.getElementById("disp_name").textContent = userData.full_name;
    document.getElementById("disp_id").textContent = userData.id_number;

    showSection("logged_in");
}

// ✅ NEW: Open Login Screen
function openLogin() {
    showSection("login");
}

// ✅ NEW: Verify Login Details
function verifyLogin() {
    let savedData = localStorage.getItem("canada_user_data");
    if (!savedData) {
        alert("❌ No account found. Please register first.");
        return;
    }

    let storedUser = JSON.parse(savedData);
    let inputName = document.getElementById("login_name").value.trim();
    let inputID = document.getElementById("login_id").value.trim();

    if (inputName === storedUser.full_name && inputID === storedUser.id_number) {
        userData = storedUser;
        document.getElementById("disp_name").textContent = userData.full_name;
        document.getElementById("disp_id").textContent = userData.id_number;
        updateUI();
        showSection("logged_in");
    } else {
        alert("❌ Incorrect Name or ID Number. Please try again.");
    }
}

// ✅ NEW: Back to Home
function backToHome() {
    showSection("welcome");
}

function showSection(name) {
    document.querySelectorAll(".sec").forEach(s => s.style.display = "none");
    document.getElementById("sec_"+name).style.display = "block";
}

        updateStatus("✅ All 3 fingerprints registered. Ready to enter.", "var(--success)");
        return;
    }

    try {
        const cred = await navigator.credentials.create({
            publicKey: {
                challenge: new Uint8Array(16),
                rp: { name: "Canada.com Official
