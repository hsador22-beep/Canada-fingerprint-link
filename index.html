<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada Secure Biometrics</title>
    <style>
        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --error: #ff4b2b;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; letter-spacing: 1px; margin-bottom: 30px; font-size: 22px; }
        
        input {
            width: 85%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.3s;
        }

        .btn-reg { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .btn-save { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); }
        .btn-login { background: linear-gradient(135deg, #00f2ff, #00ff88); color: #000; margin-top: 15px;}

        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .finger-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .slot {
            height: 45px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: 0.4s;
        }

        .slot.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            color: #000;
            border: none;
        }

        .status-text { font-size: 13px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <!-- SCREEN 1: PRIVATE SIGN UP (User list removed) -->
    <div id="sec_welcome" class="sec">
        <div style="font-size: 10px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 10px;">IDENTITY SETUP</div>
        <h2>Sign Up</h2>
        <input type="text" id="new_name" placeholder="Enter Your Name">
        <button class="btn btn-reg" onclick="signUp()">➕ CREATE ACCOUNT</button>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="sec_logged_in" class="sec" style="display:none;">
        <div style="font-size: 10px; color: var(--primary); letter-spacing: 3px;">SECURE SESSION</div>
        <h2 id="current_user_display">👤 User</h2>
        
        <div class="finger-grid" id="fingerGrid">
            <div class="slot" id="s1">1</div>
            <div class="slot" id="s2">2</div>
            <div class="slot" id="s3">3</div>
            <div class="slot" id="s4">4</div>
            <div class="slot" id="s5">5</div>
        </div>

        <button class="btn btn-save" id="btnSave" onclick="saveFinger()">✋ SAVE UNIQUE FINGER</button>
        <button class="btn btn-login" onclick="login()">👉 VERIFY & LOGIN</button>
        
        <div class="status-text" id="statusMsg">Ready to scan 5 unique fingers.</div>
    </div>
</div>

<script>
const MY_LINK = "https://canada.com";

// Only logic to handle the current session, no public user list displayed
async function signUp() {
    let name = document.getElementById("new_name").value.trim();
    if (!name) return;
    
    // Save locally but don't show on front end
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    if (!all[name]) {
        all[name] = { fps: [] };
        localStorage.setItem("all_users", JSON.stringify(all));
    }
    
    localStorage.setItem("current_user", name);
    document.getElementById("current_user_display").textContent = name;
    showSection("logged_in");
    updateUI();
}

function showSection(name) {
    document.querySelectorAll(".sec").forEach(s => s.style.display = "none");
    document.getElementById("sec_"+name).style.display = "block";
}

async function saveFinger() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    if (all[user].fps.length >= 5) return;

    try {
        const cred = await navigator.credentials.create({
            publicKey: {
                challenge: new Uint8Array(16),
                rp: { name: "Canada Secure", id: location.hostname },
                user: { id: new Uint8Array(16), name: user, displayName: user },
                pubKeyCredParams: [{type:"public-key", alg:-7}],
                authenticatorSelection: { userVerification:"required" }
            }
        });

        let idStr = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
        
        // UNIQUE CHECK
        if (all[user].fps.includes(idStr)) {
            let msg = document.getElementById("statusMsg");
            msg.innerText = "❌ DUPLICATE FINGER DETECTED!";
            msg.style.color = "var(--error)";
            return;
        }

        all[user].fps.push(idStr);
        localStorage.setItem("all_users", JSON.stringify(all));
        updateUI();
        document.getElementById("statusMsg").innerText = "✅ Finger " + all[user].fps.length + " Saved";
        document.getElementById("statusMsg").style.color = "var(--success)";
    } catch(e) { console.error(e); }
}

async function login() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    if (all[user].fps.length < 5) { alert("Save 5 unique fingers first!"); return; }

    try {
        let allowed = all[user].fps.map(id => ({
            type: "public-key",
            id: Uint8Array.from(atob(id), c=>c.charCodeAt(0))
        }));

        await navigator.credentials.get({
            publicKey: { challenge: new Uint8Array(16), allowCredentials: allowed }
        });

        window.location.href = MY_LINK;
    } catch(e) { alert("Verification Failed!"); }
}

function updateUI() {
    let user = localStorage.getItem("current_user");
    let all = JSON.parse(localStorage.getItem("all_users") || "{}");
    let count = all[user]?.fps.length || 0;
    
    for (let i = 1; i <= 5; i++) {
        let slot = document.getElementById("s" + i);
        if (i <= count) {
            slot.classList.add("active");
            slot.textContent = "✔";
        }
    }
}
</script>
</body>
</html>
