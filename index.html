<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada Secure Vault</title>
    <style>
        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --error: #ff4b2b;
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--bg) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 300; letter-spacing: 1px; margin-bottom: 30px; }
        
        input {
            width: 85%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.3s;
        }

        .btn-reg { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .btn-save { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }
        .btn-login { background: linear-gradient(135deg, #00f2ff, #00ff88); color: #000; margin-top: 20px; }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Status Grid */
        .finger-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .slot {
            height: 45px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .slot.active {
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            color: #000;
            border: none;
            transform: scale(1.1);
        }

        .status-msg { font-size: 13px; color: #888; margin-top: 15px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- STEP 1: INITIAL SIGN UP -->
    <div id="sec_signup" class="sec">
        <div style="font-size: 10px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 10px;">IDENTITY SETUP</div>
        <h2>Create Access</h2>
        <input type="text" id="user_name" placeholder="Enter Identity Name">
        <button class="btn btn-reg" onclick="initAccount()">START REGISTRATION</button>
    </div>

    <!-- STEP 2: BIOMETRIC ENROLLMENT & LOGIN -->
    <div id="sec_main" class="sec" style="display:none;">
        <div style="font-size: 10px; letter-spacing: 3px; opacity: 0.5; margin-bottom: 10px;">SECURE VAULT</div>
        <h2 id="display_name">Biometric Link</h2>
        
        <div class="finger-grid">
            <div class="slot" id="f1">1</div>
            <div class="slot" id="f2">2</div>
            <div class="slot" id="f3">3</div>
            <div class="slot" id="f4">4</div>
            <div class="slot" id="f5">5</div>
        </div>

        <button class="btn btn-save" onclick="enrollFinger()">✋ ADD UNIQUE FINGER</button>
        <button class="btn btn-login" onclick="verifyAccess()">👉 UNLOCK CANADA.COM</button>
        
        <div class="status-msg" id="msg">Scanning active...</div>
    </div>
</div>

<script>
    const TARGET = "https://canada.com";
    let currentUser = null;
    let savedFinger IDs = [];

    // Initialize session
    function initAccount() {
        const name = document.getElementById('user_name').value.trim();
        if(!name) return;
        
        currentUser = name;
        document.getElementById('display_name').textContent = name;
        document.getElementById('sec_signup').style.display = 'none';
        document.getElementById('sec_main').style.display = 'block';
    }

    async function enrollFinger() {
        if (savedFingerIDs.length >= 5) {
            updateMsg("✅ 5 Fingers secured.", "var(--success)");
            return;
        }

        try {
            const challenge = window.crypto.getRandomValues(new Uint8Array(32));
            const credential = await navigator.credentials.create({
                publicKey: {
                    challenge: challenge,
                    rp: { name: "CanadaSecure" },
                    user: { 
                        id: window.crypto.getRandomValues(new Uint8Array(16)), 
                        name: currentUser, 
                        displayName: currentUser 
                    },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { userVerification: "required" }
                }
            });

            const fingerID = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));

            // CHECK UNIQUE
            if (savedFingerIDs.includes(fingerID)) {
                updateMsg("❌ FINGER ALREADY USED", var(--error));
            } else {
                savedFingerIDs.push(fingerID);
                updateProgress();
                updateMsg("✅ Finger " + savedFingerIDs.length + " Linked", "var(--success)");
            }
        } catch (e) {
            updateMsg("Scan Cancelled", "#888");
        }
    }

    async function verifyAccess() {
        if (savedFingerIDs.length < 5) {
            updateMsg("Need 5 unique fingers first!", var(--error));
            return;
        }

        try {
            const challenge = window.crypto.getRandomValues(new Uint8Array(32));
            await navigator.credentials.get({
                publicKey: {
                    challenge: challenge,
                    allowCredentials: savedFingerIDs.map(id => ({
                        id: Uint8Array.from(atob(id), c => c.charCodeAt(0)),
                        type: 'public-key'
                    }))
                }
            });
            
            updateMsg("ACCESS GRANTED", "var(--success)");
            setTimeout(() => window.location.href = TARGET, 500);
        } catch (e) {
            updateMsg("Verification Failed", var(--error));
        }
    }

    function updateProgress() {
        for (let i = 1; i <= 5; i++) {
            const slot = document.getElementById('f' + i);
            if (i <= savedFingerIDs.length) {
                slot.classList.add('active');
                slot.innerHTML = "✔";
            }
        }
    }

    function updateMsg(text, color) {
        const m = document.getElementById('msg');
        m.innerText = text;
        m.style.color = color;
    }
</script>

</body>
</html>
